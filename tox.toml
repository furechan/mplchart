# tox configuration
# https://tox.wiki/en/latest/config.html
# https://docs.astral.sh/ruff/settings/

work_dir = ".venv/tox"
env_list = ["3.10", "3.11", "3.12", "3.13", "3.14", "ruff", "pandas", "polars"]

[env_run_base]
deps = ["pytest"]
extras = ["pandas", "polars"]
commands = [["python", "-m", "pytest"]]
set_env = { PYTHONDONTWRITEBYTECODE="1" }

[env.ruff]
deps = ["ruff"]
commands = [["python", "-m", "ruff", "check"]]
set_env = { RUFF_CACHE_DIR=".venv/ruff_cache" }
skip_install = true

# pandas-only install — polars tests skip via importorskip
[env.pandas]
deps = ["pytest"]
extras = ["pandas"]

# polars-only install — pandas tests skip via importorskip
[env.polars]
deps = ["pytest"]
extras = ["polars"]
